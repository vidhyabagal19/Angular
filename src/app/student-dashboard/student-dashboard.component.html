
<div class="container mt-5;p-3 mb-2 bg-danger-subtle text-light-emphasis">
<div class="row mt-3">
<div class="col sm-4 mx-auto mt-3 shadow box">
    <h2><b>Add Student</b></h2>
        <form [formGroup]="studentForm">
            <div>
            <label for="input0">Id:</label>
            <input formControlName="id" id="input0" placeholder="Enter id">
            </div><br>

            <div>
            <label for="input1">Student Name: </label>
            <input type="text" formControlName="name" id="input1" placeholder="Enter Name">        
            </div><br>

            <div>
            <label for="input2">Email: </label>
            <input type="email" formControlName="email" id="imput2" placeholder="Enter email">
            </div><br>

            <div>
            <label for="input3">Course: </label>
            <input type="text" formControlName="course" id="imput3" placeholder="Enter course">
            </div><br>

            <div>
            <label for="input4">Age:</label>
            <input type="number" formControlName="age" id="imput4" placeholder="Enter your age">
            </div><br>
            
            <div>
            <button type="button" (click)="AddStudent()" class="btn btn-dark">Add</button>
            <button type="button" (click)="UpdateData()" class="btn btn-dark">Update</button>
            <button type="button" (click)="getStudent()" class="btn btn-dark">Get Data</button>
            </div>
        </form>
    </div>
</div>
</div>
<hr>
<app-student-list [studentData]="students" [filteredData]="filteredData" (removeStudent)="DeleteStudent ($event)" (editStudent)="EditStudent ($event)"></app-student-list>
